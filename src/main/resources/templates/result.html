<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultados de la Elección</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f5f5f7;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .header-title {
            text-align: center;
            font-size: 2.5rem;
            color: #033771;
            margin-top: 40px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 20px;
        }

        .podium-section {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: 20px; /* Reduced gap from title */
            padding-top: 180px; /* Space for the floating card and name */
            padding-bottom: 50px;
            padding-left: 20px;
            padding-right: 20px;
            min-height: auto;
        }

        .podium-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: nowrap; /* Keep them together for the podium feel on desktop */
        }

        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 220px; /* Max width to avoid looking too fat */
            min-width: 140px; /* Better fitting for smaller windows */
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            color: white;
            transition: all 0.3s ease;
            flex: 1; /* Distribute available space */
        }
        
        .podium-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        .podium-info {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 15px;
            z-index: 10;
        }

        .podium-photo {
            width: 100%;
            max-width: 180px;
            aspect-ratio: 3/2; /* Keep rectangular shape relative to width */
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .podium-photo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }
        
        .badge {
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: #333;
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .podium-name {
            margin-top: 25px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            font-size: 0.85rem;
            line-height: 1.2;
            background: rgba(3, 55, 113, 0.9);
            padding: 8px 12px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 95%;
            box-sizing: border-box;
            white-space: normal;
            word-wrap: break-word;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .podium-votes {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: auto;
            margin-bottom: 10px;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.3);
        }
        
        .podium-label {
            font-size: 0.9rem;
            font-weight: 800;
            opacity: 0.95;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Rank backgrounds */
        .rank-1 { background: linear-gradient(135deg, #FFD700 0%, #F5A623 100%); }
        .rank-2 { background: linear-gradient(135deg, #E0E0E0 0%, #9E9E9E 100%); }
        .rank-3 { background: linear-gradient(135deg, #CD7F32 0%, #A0522D 100%); }
        .rank-other { background: linear-gradient(135deg, #4bc0c0 0%, #033771 100%); }
        
        @media (max-width: 992px) {
            .podium-wrapper { 
                flex-wrap: wrap; 
                justify-content: space-evenly;
                gap: 30px 10px;
            }
            .podium-item { 
                flex: 0 1 45%; 
                margin-top: 150px; /* Separation for wrapped lines */
            }
            .podium-section {
                padding-top: 20px;
            }
        }

        @media (max-width: 576px) {
            .podium-item { 
                flex: 0 1 90%; 
            }
        }
    </style>
</head>
<body>

    <h1 class="header-title" th:text="${(election?.name ?: 'Resultados') + ' ' + (election?.year ?: '')}"></h1>
    
    <div th:if="${UIResults != null and not #lists.isEmpty(UIResults)}">
        <!-- ALL Candidates dynamically aligned as a bar chart / podium -->
        <div class="podium-section">
            <!-- maxVotes determines the tallest bar proportionally. results is sorted highest to lowest -->
            <div class="podium-wrapper">
                
                <th:block th:each="r, stat : ${UIResults}">
                    <div class="podium-item" 
                         th:style="'height: ' + ${r.height} + 'px; z-index: ' + ${100 - stat.index} + ';'"
                         th:classappend="${stat.index == 0 ? 'rank-1' : (stat.index == 1 ? 'rank-2' : (stat.index == 2 ? 'rank-3' : 'rank-other'))}">
                        
                        <div class="podium-info">
                            <div class="podium-photo">
                                <!-- Photo fallback logic applied in Java -->
                                <img th:src="@{/uploads/} + ${r.image}" alt="Candidato">
                                <span class="badge" th:text="${stat.index + 1}"></span>
                            </div>
                            <div class="podium-name" th:title="${r.name}" th:text="${r.name}">Nombre Lista</div>
                        </div>

                        <div class="podium-votes" th:text="${r.votes}">0</div>
                        <div class="podium-label">VOTOS</div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
    
    <div th:if="${UIResults == null or #lists.isEmpty(UIResults)}" style="text-align: center; margin-top: 80px;">
        <h2 style="color: #666; font-weight: 700; font-size: 1.8rem;">Aún no hay votos registrados</h2>
        <p style="color: #999;">Los resultados aparecerán aquí tan pronto como se emitan votos.</p>
    </div>

</body>
</html>
