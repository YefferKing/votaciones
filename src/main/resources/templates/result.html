<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultados de la Elección</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f5f5f7;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .header-title {
            text-align: center;
            font-size: 2.5rem;
            color: #033771;
            margin-top: 40px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 20px;
        }

        .podium-section {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: 150px;
            padding-bottom: 50px;
            min-height: 500px;
            overflow-x: auto; /* In case there are many candidates */
        }

        .podium-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            padding: 0 40px;
        }

        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 180px;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            color: white;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .podium-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        .podium-info {
            position: absolute;
            top: -140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .podium-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 6px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            background-color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .podium-photo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .badge {
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: #333;
            position: absolute;
            bottom: -15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .podium-name {
            margin-top: 25px;
            font-weight: 800;
            color: #fff;
            text-align: center;
            font-size: 1rem;
            background: rgba(3, 55, 113, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .podium-votes {
            font-size: 3rem;
            font-weight: 800;
            margin-top: auto;
            margin-bottom: 20px;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.3);
        }
        
        .podium-label {
            font-size: 1rem;
            font-weight: 800;
            opacity: 0.95;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Rank specific backgrounds */
        .rank-1 { background: linear-gradient(135deg, #FFD700 0%, #F5A623 100%); }
        .rank-1 .badge { color: #F5A623; }

        .rank-2 { background: linear-gradient(135deg, #E0E0E0 0%, #9E9E9E 100%); }
        .rank-2 .badge { color: #9E9E9E; }

        .rank-3 { background: linear-gradient(135deg, #CD7F32 0%, #A0522D 100%); }
        .rank-3 .badge { color: #A0522D; }

        .rank-other { background: linear-gradient(135deg, #4bc0c0 0%, #033771 100%); }
        .rank-other .badge { color: #033771; }
        
        @media (max-width: 768px) {
            .podium-item { width: 130px; }
            .podium-photo { width: 80px; height: 80px; }
            .podium-votes { font-size: 2rem; }
            .podium-info { top: -110px; }
            .podium-name { font-size: 0.85rem; padding: 5px 10px; margin-top: 20px; }
            .header-title { font-size: 1.8rem; margin-top: 30px; }
            .podium-section { margin-top: 100px; }
        }
    </style>
</head>
<body>

    <h1 class="header-title" th:text="${(election?.name ?: 'Resultados') + ' ' + (election?.year ?: '')}"></h1>
    
    <div th:if="${UIResults != null and not #lists.isEmpty(UIResults)}">
        <!-- ALL Candidates dynamically aligned as a bar chart / podium -->
        <div class="podium-section">
            <!-- maxVotes determines the tallest bar proportionally. results is sorted highest to lowest -->
            <div class="podium-wrapper">
                
                <th:block th:each="r, stat : ${UIResults}">
                    <div class="podium-item" 
                         th:style="'height: ' + ${r.height} + 'px; z-index: ' + ${100 - stat.index} + ';'"
                         th:classappend="${stat.index == 0 ? 'rank-1' : (stat.index == 1 ? 'rank-2' : (stat.index == 2 ? 'rank-3' : 'rank-other'))}">
                        
                        <div class="podium-info">
                            <div class="podium-photo">
                                <!-- Photo fallback logic applied in Java -->
                                <img th:src="@{/uploads/} + ${r.image}" alt="Candidato">
                                <span class="badge" th:text="${stat.index + 1}"></span>
                            </div>
                            <div class="podium-name" th:title="${r.name}" th:text="${r.name}">Nombre Lista</div>
                        </div>

                        <div class="podium-votes" th:text="${r.votes}">0</div>
                        <div class="podium-label">VOTOS</div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
    
    <div th:if="${UIResults == null or #lists.isEmpty(UIResults)}" style="text-align: center; margin-top: 80px;">
        <h2 style="color: #666; font-weight: 700; font-size: 1.8rem;">Aún no hay votos registrados</h2>
        <p style="color: #999;">Los resultados aparecerán aquí tan pronto como se emitan votos.</p>
    </div>

</body>
</html>
